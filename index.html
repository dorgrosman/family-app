<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הבית שלנו">
<meta name="theme-color" content="#7C3D6E">
<link rel="manifest" href="manifest.json">
<title>הבית שלנו 💑</title>
<style>
  :root {
    --bg:#FDF6F0;--card:#fff;--plum:#7C3D6E;--plum-light:#F3E8F0;
    --sage:#4A7C6F;--sage-light:#E8F3F0;--rose:#E8736A;
    --text:#2D1F2A;--muted:#9A8A96;--border:#EDE0E8;
    --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
    --header-h:88px;--nav-h:68px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,'Segoe UI','Arial Hebrew',Arial,sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100dvh;padding-top:calc(var(--header-h) + var(--safe-top));padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);overscroll-behavior:none;}
  button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
  input,select{font-family:inherit;direction:rtl;font-size:16px;}

  /* HEADER */
  .header{background:linear-gradient(135deg,var(--plum) 0%,#a0527a 100%);padding:calc(var(--safe-top) + 12px) 14px 12px;position:fixed;top:0;left:0;right:0;z-index:100;height:calc(var(--header-h) + var(--safe-top));}
  .header-inner{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .header-left{display:flex;flex-direction:column;gap:1px;}
  .header-eyebrow{font-size:10px;color:rgba(255,255,255,.65);}
  .header-names{font-size:16px;font-weight:800;color:#fff;}
  .header-center{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
  .family-avatar{width:52px;height:52px;border-radius:50%;border:2.5px solid rgba(255,255,255,.8);object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .family-label{font-size:9px;color:rgba(255,255,255,.75);font-weight:700;letter-spacing:.3px;}
  .header-right{display:flex;gap:6px;align-items:center;}
  .sync-badge{font-size:11px;padding:4px 8px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;font-weight:600;display:flex;align-items:center;gap:4px;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;flex-shrink:0;}
  .sync-dot.offline{background:#FF9800;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .edit-btn{width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .name-edit-panel{display:none;padding:10px 14px 4px;background:rgba(0,0,0,.15);margin:8px -14px -12px;}
  .name-edit-panel.open{display:flex;gap:8px;}
  .name-input{flex:1;padding:8px 11px;border-radius:10px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#fff;font-size:14px;outline:none;}
  .name-input::placeholder{color:rgba(255,255,255,.55);}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);box-shadow:0 -4px 20px rgba(0,0,0,.08);}
  .nav-btn{flex:1;border:none;background:transparent;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);transition:color .2s;}
  .nav-btn.active{color:var(--plum);}
  .nav-icon{font-size:22px;line-height:1;}
  .nav-label{font-size:10px;font-weight:600;}
  .nav-btn.active .nav-label{font-weight:700;}
  .nav-indicator{position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;border-radius:0 0 3px 3px;background:var(--plum);opacity:0;transition:opacity .2s;}
  .nav-btn.active .nav-indicator{opacity:1;}
  .nav-btn-inner{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;}

  /* CONTENT */
  .content{padding:16px 16px 0;max-width:540px;margin:0 auto;}
  .tab-panel{display:none;animation:fadeIn .2s ease;}
  .tab-panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* FILTER PILLS */
  .filter-pills{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .filter-pills::-webkit-scrollbar{display:none;}
  .pill{padding:8px 16px;border-radius:20px;border:none;background:var(--plum-light);color:var(--plum);font-weight:600;font-size:13px;white-space:nowrap;transition:all .2s;flex-shrink:0;}
  .pill.active{background:var(--plum);color:#fff;}

  /* TASK CARD */
  .task-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .task-card.done{opacity:.5;background:#F7F7F7;}
  .check-circle{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--plum);background:transparent;flex-shrink:0;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .check-circle.checked{background:var(--plum);}
  .task-body{flex:1;min-width:0;}
  .task-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;}
  .task-card.done .task-title{text-decoration:line-through;}
  .task-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center;}
  .badge{font-size:11px;padding:3px 8px;border-radius:8px;font-weight:700;}
  .badge-high{background:#fde8e7;color:var(--rose);}
  .badge-med{background:var(--plum-light);color:var(--plum);}
  .badge-low{background:var(--sage-light);color:var(--sage);}
  .meta-tag{font-size:11px;color:var(--muted);}
  .card-actions{display:flex;gap:4px;flex-shrink:0;}
  .icon-btn{background:none;border:none;color:var(--muted);font-size:16px;padding:3px;line-height:1;}
  .icon-btn:hover{color:var(--plum);}

  /* FAB */
  .fab{position:fixed;left:20px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);width:56px;height:56px;border-radius:50%;border:none;background:var(--plum);color:#fff;font-size:28px;box-shadow:0 4px 16px rgba(124,61,110,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s;z-index:90;}
  .fab:active{transform:scale(.93);}
  .fab.sage{background:var(--sage);box-shadow:0 4px 16px rgba(74,124,111,.4);}

  /* SHEET */
  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
  .sheet-backdrop.open{opacity:1;pointer-events:all;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:#fff;border-radius:24px 24px 0 0;padding:0 20px calc(20px + var(--safe-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;}
  .sheet.open{transform:translateY(0);}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 18px;}
  .sheet-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;}
  .field-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;margin-top:14px;text-transform:uppercase;letter-spacing:.3px;}
  .input-field{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:16px;color:var(--text);outline:none;transition:border-color .2s;}
  .input-field:focus{border-color:var(--plum);background:#fff;}
  .select-field{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-size:16px;color:var(--text);outline:none;appearance:none;}
  .form-row{display:flex;gap:10px;}
  .form-row>*{flex:1;}
  .btn-submit{width:100%;padding:15px;border-radius:14px;border:none;background:var(--plum);color:#fff;font-weight:700;font-size:16px;margin-top:20px;transition:opacity .2s;}
  .btn-submit:active{opacity:.85;}
  .btn-submit.sage{background:var(--sage);}
  .btn-delete{width:100%;padding:13px;border-radius:14px;border:2px solid var(--rose);background:transparent;color:var(--rose);font-weight:700;font-size:15px;margin-top:10px;}

  /* SHOPPING */
  .shop-stats{display:flex;gap:10px;margin-bottom:16px;}
  .stat-card{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .stat-num{font-size:24px;font-weight:800;color:var(--plum);}
  .stat-label{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
  .cat-group{margin-bottom:10px;}
  .cat-header{width:100%;background:var(--sage-light);border:none;border-radius:12px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--sage);font-size:14px;}
  .cat-count{font-size:12px;color:var(--muted);font-weight:600;}
  .shop-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border-radius:12px;margin-bottom:4px;border:1px solid var(--border);}
  .shop-item.done{opacity:.45;}
  .shop-name{flex:1;font-size:15px;font-weight:500;color:var(--text);}
  .shop-item.done .shop-name{text-decoration:line-through;}
  .check-sq{width:24px;height:24px;border-radius:7px;border:2.5px solid var(--sage);background:transparent;flex-shrink:0;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .check-sq.checked{background:var(--sage);border-color:var(--sage);}
  .clear-btn{width:100%;padding:12px;border-radius:12px;border:2px dashed var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;margin-top:8px;display:none;}

  /* CALENDAR */
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .cal-nav-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--plum-light);color:var(--plum);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .cal-month{font-size:18px;font-weight:800;color:var(--plum);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px;}
  .cal-day-name{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0;}
  .cal-cell{border-radius:10px;padding:6px 2px;text-align:center;cursor:pointer;min-height:46px;border:2px solid transparent;transition:background .15s;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;}
  .cal-cell:active{background:var(--plum-light) !important;}
  .cal-cell.today{background:var(--plum);color:#fff;}
  .cal-cell.selected:not(.today){border-color:var(--plum);background:var(--plum-light);}
  .cal-num{font-size:14px;font-weight:500;}
  .cal-cell.today .cal-num{font-weight:800;}
  .cal-dots{display:flex;justify-content:center;gap:2px;margin-top:3px;}
  .cal-dot{width:5px;height:5px;border-radius:50%;}
  .cal-cell.today .cal-dot{background:rgba(255,255,255,.8) !important;}
  .upcoming-title{font-size:14px;font-weight:700;color:var(--plum);margin:18px 0 10px;}
  .event-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .event-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .event-title{font-size:15px;font-weight:600;color:var(--text);}
  .event-meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .emoji-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .emoji-btn{font-size:22px;padding:6px 8px;border-radius:10px;border:none;background:transparent;}
  .emoji-btn.active{background:var(--plum-light);}
  .color-picker{display:flex;gap:10px;margin-top:12px;}
  .color-swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s;}
  .color-swatch.active{border-color:var(--text);transform:scale(1.2);}

  /* EMPTY */
  .empty-state{text-align:center;color:var(--muted);padding:48px 20px;font-size:15px;line-height:1.6;}
  .empty-icon{font-size:48px;display:block;margin-bottom:10px;}

  /* LOADER */
  .loader-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
  .loader-spinner{width:44px;height:44px;border:4px solid var(--plum-light);border-top-color:var(--plum);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{margin-top:16px;color:var(--plum);font-weight:700;font-size:15px;}

  /* TOAST */
  #toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:500;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* PWA BANNER */
  #installBanner{display:none;position:fixed;top:calc(var(--header-h) + var(--safe-top) + 8px);left:12px;right:12px;z-index:150;background:var(--plum);color:#fff;border-radius:16px;padding:12px 16px;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(124,61,110,.35);}
  #installBanner.show{display:flex;}
  .install-btn{background:#fff;color:var(--plum);border:none;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px;font-family:inherit;flex-shrink:0;}
</style>
</head>

    <div><div class="field-label">מיועד ל</div><select class="select-field" id="taskAssignee"></select></div>
    <div><div class="field-label">עדיפות</div>
      <select class="select-field" id="taskPriority">
        <option value="גבוה">🔴 גבוה</option>
        <option value="בינוני" selected>🟡 בינוני</option>
        <option value="נמוך">🟢 נמוך</option>
      </select>
    </div>
  </div>
  <div class="field-label">תאריך יעד</div>
  <input class="input-field" type="date" id="taskDue">
  <button class="btn-submit" id="taskSubmitBtn" onclick="saveTask()">הוסף משימה</button>
  <button class="btn-delete" id="taskDeleteBtn" style="display:none" onclick="deleteEditTask()">🗑️ מחק משימה</button>
</div>

<!-- SHOP SHEET -->
<div class="sheet" id="shopSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">פריט חדש 🛒</div>
  <div class="field-label">מה לקנות?</div>
  <input class="input-field" id="shopName" placeholder="שם המוצר...">
  <div class="field-label">קטגוריה</div>
  <select class="select-field" id="shopCat">
    <option>🥦 ירקות ופירות</option><option>🥛 מוצרי חלב</option>
    <option>🍗 בשר ודגים</option><option>🥫 יבשים ושימורים</option>
    <option>🧴 ניקיון ובית</option><option>🍫 חטיפים וממתקים</option>
    <option>🥖 לחם ומאפים</option><option>אחר</option>
  </select>
  <div class="field-label">נוסף על ידי</div>
  <select class="select-field" id="shopBy"></select>
  <button class="btn-submit sage" onclick="saveShopItem()">הוסף לרשימה</button>
</div>

<!-- CALENDAR SHEET (add/edit) -->
<div class="sheet" id="calSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="calSheetTitle">אירוע חדש 📅</div>
  <div class="field-label">שם האירוע</div>
  <input class="input-field" id="evTitle" placeholder="מה קורה?">
  <div class="form-row" style="margin-top:14px">
    <div><div class="field-label">של מי?</div><select class="select-field" id="evOwner"></select></div>
    <div><div class="field-label">שעה</div><input class="input-field" type="time" id="evTime"></div>
  </div>
  <div class="form-row" style="margin-top:14px">
    <div><div class="field-label">מתאריך</div><input class="input-field" type="date" id="evDateFrom"></div>
    <div><div class="field-label">עד תאריך</div><input class="input-field" type="date" id="evDateTo"></div>
  </div>
  <div class="field-label">אמוג'י</div>
  <div class="emoji-picker" id="emojiPicker"></div>
  <div class="field-label">צבע</div>
  <div class="color-picker" id="colorPicker"></div>
  <button class="btn-submit" id="calSubmitBtn" onclick="saveEvent()">הוסף אירוע</button>
  <button class="btn-delete" id="calDeleteBtn" style="display:none" onclick="deleteEditEvent()">🗑️ מחק אירוע</button>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,onSnapshot,addDoc,updateDoc,deleteDoc,doc,setDoc,getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyAXWgxjh4jH9Bd9zaQu0LPJwprEMfm4OFI",authDomain:"family-app-45d82.firebaseapp.com",projectId:"family-app-45d82",storageBucket:"family-app-45d82.firebasestorage.app",messagingSenderId:"811925409475",appId:"1:811925409475:web:d3b49f8908c1f582899c76"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let myName='אני',partnerName='פרטנר';
let taskFilter='all',calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let selectedEmoji='🗓️',selectedColor='#7C3D6E';
let tasks=[],shopping=[],events=[];
let currentTab='tasks',activeSheet=null;
let editingTaskId=null,editingEventId=null;
let deferredInstallPrompt=null;

const HEB_MONTHS=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HEB_DAYS=['א','ב','ג','ד','ה','ו','ש'];
const EMOJIS=['🗓️','🍷','🎂','🏕️','👨‍👩‍👧','🎬','🏋️','✈️','🎁','💊','🐾','🌿','🎵','☕','🍕'];
const EVENT_COLORS=['#7C3D6E','#E8736A','#4A7C6F','#5B8ACE','#E8A030','#9B59B6'];
const SHOP_CATS=['🥦 ירקות ופירות','🥛 מוצרי חלב','🍗 בשר ודגים','🥫 יבשים ושימורים','🧴 ניקיון ובית','🍫 חטיפים וממתקים','🥖 לחם ומאפים','אחר'];

function pad(n){return String(n).padStart(2,'0');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function setSyncStatus(on){document.getElementById('syncDot').className='sync-dot'+(on?'':' offline');document.getElementById('syncLabel').textContent=on?'מסונכרן':'מתחבר...';}

// NAMES
async function loadNames(){
  try{const s=await getDoc(doc(db,'settings','names'));if(s.exists()){const d=s.data();myName=d.myName||'אני';partnerName=d.partnerName||'פרטנר';}}catch(e){}
  document.getElementById('myNameInput').value=myName;
  document.getElementById('partnerNameInput').value=partnerName;
  updateNamesUI();
}
async function saveNames(){
  myName=document.getElementById('myNameInput').value||'אני';
  partnerName=document.getElementById('partnerNameInput').value||'פרטנר';
  try{await setDoc(doc(db,'settings','names'),{myName,partnerName});}catch(e){}
  updateNamesUI();
}
function updateNamesUI(){
  document.getElementById('headerNames').textContent=myName+' & '+partnerName+' 💑';
  document.getElementById('mineFilterBtn').textContent=myName;
  document.getElementById('partnerFilterBtn').textContent=partnerName;
  ['taskAssignee','shopBy','evOwner'].forEach(id=>{
    const s=document.getElementById(id);if(!s)return;
    s.innerHTML='<option>'+myName+'</option><option>'+partnerName+'</option>';
    if(id==='taskAssignee')s.innerHTML+='<option>שנינו</option>';
    if(id==='evOwner')s.innerHTML+='<option>שנינו</option>';
  });
}
window.toggleEditNames=()=>document.getElementById('nameEditPanel').classList.toggle('open');
window.saveNames=saveNames;

// TAB
window.switchTab=(name,btn)=>{
  currentTab=name;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab').className='fab'+(name==='shopping'?' sage':'');
};

// SHEET
window.openSheet=()=>{
  editingTaskId=null;editingEventId=null;
  const sid=currentTab==='tasks'?'taskSheet':currentTab==='shopping'?'shopSheet':'calSheet';
  if(currentTab==='tasks'){
    document.getElementById('taskSheetTitle').textContent='משימה חדשה ✅';
    document.getElementById('taskTitle').value='';
    document.getElementById('taskDue').value='';
    document.getElementById('taskSubmitBtn').textContent='הוסף משימה';
    document.getElementById('taskDeleteBtn').style.display='none';
  }
  if(currentTab==='calendar'){
    document.getElementById('calSheetTitle').textContent='אירוע חדש 📅';
    document.getElementById('evTitle').value='';document.getElementById('evTime').value='';
    const td=new Date();
    document.getElementById('evDateFrom').value=td.toISOString().slice(0,10);
    document.getElementById('evDateTo').value='';
    document.getElementById('calSubmitBtn').textContent='הוסף אירוע';
    document.getElementById('calDeleteBtn').style.display='none';
    selectedEmoji='🗓️';selectedColor='#7C3D6E';
    renderEmojiPicker();renderColorPicker();
  }
  activeSheet=document.getElementById(sid);
  document.getElementById('sheetBackdrop').classList.add('open');
  activeSheet.classList.add('open');
  setTimeout(()=>{const f=activeSheet.querySelector('input');if(f)f.focus();},350);
};
window.closeSheet=()=>{
  document.getElementById('sheetBackdrop').classList.remove('open');
  if(activeSheet)activeSheet.classList.remove('open');
  activeSheet=null;
};

// TASKS
function renderTasks(){
  let f=tasks;
  if(taskFilter==='mine')f=tasks.filter(t=>t.assignee===myName||t.assignee==='אני');
  else if(taskFilter==='partner')f=tasks.filter(t=>t.assignee===partnerName||t.assignee==='פרטנר');
  else if(taskFilter==='pending')f=tasks.filter(t=>!t.done);
  const el=document.getElementById('taskList');
  if(!f.length){el.innerHTML='<div class="empty-state"><span class="empty-icon">🎉</span>אין משימות כאן!</div>';return;}
  el.innerHTML=f.map(t=>`
    <div class="task-card ${t.done?'done':''}">
      <button class="check-circle ${t.done?'checked':''}" onclick="toggleTask('${t.id}',${!t.done})">${t.done?'✓':''}</button>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <span class="badge badge-${t.priority==='גבוה'?'high':t.priority==='בינוני'?'med':'low'}">${t.priority}</span>
          <span class="meta-tag">👤 ${t.assignee}</span>
          ${t.dueDate?'<span class="meta-tag">📅 '+t.dueDate+'</span>':''}
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="editTask('${t.id}')" title="עריכה">✏️</button>
        <button class="icon-btn" onclick="deleteTask('${t.id}')" title="מחיקה" style="color:var(--border)">×</button>
      </div>
    </div>`).join('');
}
window.toggleTask=async(id,done)=>{await updateDoc(doc(db,'tasks',id),{done});};
window.deleteTask=async(id)=>{await deleteDoc(doc(db,'tasks',id));};
window.deleteEditTask=async()=>{
  if(!editingTaskId)return;
  await deleteDoc(doc(db,'tasks',editingTaskId));
  closeSheet();toast('🗑️ משימה נמחקה');
};
window.editTask=(id)=>{
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editingTaskId=id;
  document.getElementById('taskSheetTitle').textContent='עריכת משימה ✏️';
  document.getElementById('taskTitle').value=t.title;
  document.getElementById('taskAssignee').value=t.assignee;
  document.getElementById('taskPriority').value=t.priority;
  document.getElementById('taskDue').value=t.dueDate||'';
  document.getElementById('taskSubmitBtn').textContent='שמור שינויים';
  document.getElementById('taskDeleteBtn').style.display='block';
  activeSheet=document.getElementById('taskSheet');
  document.getElementById('sheetBackdrop').classList.add('open');
  activeSheet.classList.add('open');
};
window.setTaskFilter=(f,btn)=>{
  taskFilter=f;
  document.querySelectorAll('.filter-pills .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderTasks();
};
window.saveTask=async()=>{
  const title=document.getElementById('taskTitle').value.trim();if(!title)return;
  const data={title,assignee:document.getElementById('taskAssignee').value,priority:document.getElementById('taskPriority').value,dueDate:document.getElementById('taskDue').value};
  if(editingTaskId){
    await updateDoc(doc(db,'tasks',editingTaskId),data);
    closeSheet();toast('✅ משימה עודכנה!');
  } else {
    await addDoc(collection(db,'tasks'),{...data,done:false,createdAt:Date.now()});
    closeSheet();toast('✅ משימה נוספה!');
  }
};

// SHOPPING
function renderShopping(){
  const pending=shopping.filter(i=>!i.done).length;
  const done=shopping.filter(i=>i.done).length;
  document.getElementById('shopPendingNum').textContent=pending;
  document.getElementById('shopDoneNum').textContent=done;
  document.getElementById('clearDoneBtn').style.display=done>0?'block':'none';
  const grouped={};
  SHOP_CATS.forEach(c=>{const g=shopping.filter(i=>i.category===c);if(g.length)grouped[c]=g;});
  const el=document.getElementById('shopList');
  if(!Object.keys(grouped).length){el.innerHTML='<div class="empty-state"><span class="empty-icon">🛒</span>הרשימה ריקה!</div>';return;}
  el.innerHTML=Object.entries(grouped).map(([cat,items])=>`
    <div class="cat-group">
      <button class="cat-header" onclick="toggleCat(this)">
        <span>${cat}</span><span class="cat-count">${items.filter(i=>!i.done).length}/${items.length}</span>
      </button>
      <div class="cat-items">
        ${items.map(item=>`
          <div class="shop-item ${item.done?'done':''}">
            <button class="check-sq ${item.done?'checked':''}" onclick="toggleShop('${item.id}',${!item.done})">${item.done?'✓':''}</button>
            <span class="shop-name">${item.name}</span>
            <span class="meta-tag" style="font-size:10px">👤${item.addedBy}</span>
            <button class="icon-btn" onclick="deleteShop('${item.id}')" style="color:var(--border)">×</button>
          </div>`).join('')}
      </div>
    </div>`).join('');
}
window.toggleCat=btn=>{const i=btn.nextElementSibling;i.style.display=i.style.display==='none'?'block':'none';};
window.toggleShop=async(id,done)=>{await updateDoc(doc(db,'shopping',id),{done});};
window.deleteShop=async(id)=>{await deleteDoc(doc(db,'shopping',id));};
window.clearDoneShopping=async()=>{for(const i of shopping.filter(i=>i.done))await deleteDoc(doc(db,'shopping',i.id));toast('🗑️ נוקה!');};
window.saveShopItem=async()=>{
  const name=document.getElementById('shopName').value.trim();if(!name)return;
  await addDoc(collection(db,'shopping'),{name,category:document.getElementById('shopCat').value,addedBy:document.getElementById('shopBy').value,done:false,createdAt:Date.now()});
  document.getElementById('shopName').value='';
  closeSheet();toast('🛒 פריט נוסף!');
};

// CALENDAR
function formatEventDates(e){
  const from=e.dateFrom||e.date;
  const to=e.dateTo;
  let dateStr=from?from.slice(8,10)+'/'+from.slice(5,7):'';
  if(to&&to!==from)dateStr+=' — '+to.slice(8,10)+'/'+to.slice(5,7);
  if(e.time)dateStr+=' • '+e.time;
  if(e.owner)dateStr+=' • 👤'+e.owner;
  return dateStr;
}
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent=HEB_MONTHS[calMonth]+' '+calYear;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const totalDays=new Date(calYear,calMonth+1,0).getDate();
  const td=new Date();
  let html=HEB_DAYS.map(d=>'<div class="cal-day-name">'+d+'</div>').join('');
  for(let i=0;i<firstDay;i++)html+='<div></div>';
  for(let d=1;d<=totalDays;d++){
    const dateStr=calYear+'-'+pad(calMonth+1)+'-'+pad(d);
    const dayEvs=events.filter(e=>{
      const from=e.dateFrom||e.date||'';
      const to=e.dateTo||from;
      return dateStr>=from&&dateStr<=to;
    });
    const isToday=d===td.getDate()&&calMonth===td.getMonth()&&calYear===td.getFullYear();
    html+='<div class="cal-cell '+(isToday?'today':'')+'" onclick="calDayTap('+d+')"><span class="cal-num">'+d+'</span><div class="cal-dots">'+dayEvs.slice(0,3).map(e=>'<div class="cal-dot" style="background:'+e.color+'"></div>').join('')+'</div></div>';
  }
  document.getElementById('calGrid').innerHTML=html;
  const todayStr=new Date().toISOString().slice(0,10);
  const upcoming=events.filter(e=>(e.dateTo||e.dateFrom||e.date||'')>=todayStr).sort((a,b)=>(a.dateFrom||a.date||'').localeCompare(b.dateFrom||b.date||'')).slice(0,8);
  const upEl=document.getElementById('upcomingList');
  if(!upcoming.length){upEl.innerHTML='<div class="empty-state" style="padding:20px 0">אין אירועים קרובים 📭</div>';return;}
  upEl.innerHTML=upcoming.map(e=>`
    <div class="event-card">
      <div class="event-icon" style="background:${e.color}22">${e.emoji}</div>
      <div style="flex:1">
        <div class="event-title">${e.title}</div>
        <div class="event-meta">${formatEventDates(e)}</div>
      </div>
      <div class="card-actions">
        <button class="icon-btn" onclick="editEvent('${e.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteEvent('${e.id}')" style="color:var(--border)">×</button>
      </div>
    </div>`).join('');
}
window.calNav=dir=>{
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
};
window.calDayTap=d=>{
  const dateStr=calYear+'-'+pad(calMonth+1)+'-'+pad(d);
  editingEventId=null;
  document.getElementById('calSheetTitle').textContent='אירוע ביום '+d+'/'+(calMonth+1)+' 📅';
  document.getElementById('evTitle').value='';document.getElementById('evTime').value='';
  document.getElementById('evDateFrom').value=dateStr;document.getElementById('evDateTo').value='';
  document.getElementById('calSubmitBtn').textContent='הוסף אירוע';
  document.getElementById('calDeleteBtn').style.display='none';
  selectedEmoji='🗓️';selectedColor='#7C3D6E';
  renderEmojiPicker();renderColorPicker();
  activeSheet=document.getElementById('calSheet');
  document.getElementById('sheetBackdrop').classList.add('open');
  activeSheet.classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(),350);
};
window.editEvent=(id)=>{
  const e=events.find(x=>x.id===id);if(!e)return;
  editingEventId=id;
  document.getElementById('calSheetTitle').textContent='עריכת אירוע ✏️';
  document.getElementById('evTitle').value=e.title;
  document.getElementById('evTime').value=e.time||'';
  document.getElementById('evDateFrom').value=e.dateFrom||e.date||'';
  document.getElementById('evDateTo').value=e.dateTo||'';
  document.getElementById('evOwner').value=e.owner||myName;
  document.getElementById('calSubmitBtn').textContent='שמור שינויים';
  document.getElementById('calDeleteBtn').style.display='block';
  selectedEmoji=e.emoji||'🗓️';selectedColor=e.color||'#7C3D6E';
  renderEmojiPicker();renderColorPicker();
  activeSheet=document.getElementById('calSheet');
  document.getElementById('sheetBackdrop').classList.add('open');
  activeSheet.classList.add('open');
};
window.deleteEvent=async id=>{await deleteDoc(doc(db,'events',id));toast('🗑️ אירוע נמחק');};
window.deleteEditEvent=async()=>{
  if(!editingEventId)return;
  await deleteDoc(doc(db,'events',editingEventId));
  closeSheet();toast('🗑️ אירוע נמחק');
};
function renderEmojiPicker(){
  document.getElementById('emojiPicker').innerHTML=EMOJIS.map(em=>'<button class="emoji-btn '+(em===selectedEmoji?'active':'')+'" onclick="pickEmoji(\''+em+'\')">'+em+'</button>').join('');
}
function renderColorPicker(){
  document.getElementById('colorPicker').innerHTML=EVENT_COLORS.map(c=>'<div class="color-swatch '+(c===selectedColor?'active':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\')"></div>').join('');
}
window.pickEmoji=em=>{selectedEmoji=em;renderEmojiPicker();};
window.pickColor=c=>{selectedColor=c;renderColorPicker();};
window.saveEvent=async()=>{
  const title=document.getElementById('evTitle').value.trim();if(!title)return;
  const dateFrom=document.getElementById('evDateFrom').value;
  const dateTo=document.getElementById('evDateTo').value||dateFrom;
  const data={title,dateFrom,dateTo,date:dateFrom,time:document.getElementById('evTime').value,owner:document.getElementById('evOwner').value,emoji:selectedEmoji,color:selectedColor};
  if(editingEventId){
    await updateDoc(doc(db,'events',editingEventId),data);
    closeSheet();toast('📅 אירוע עודכן!');
  } else {
    await addDoc(collection(db,'events'),{...data,createdAt:Date.now()});
    closeSheet();toast('📅 אירוע נוסף!');
  }
};

// NOTIFICATIONS
async function requestNotifications(){
  if(!('Notification'in window))return;
  if(Notification.permission==='default')await Notification.requestPermission();
}
function checkTodayNotifications(){
  if(Notification.permission!=='granted')return;
  const todayStr=new Date().toISOString().slice(0,10);
  const todayTasks=tasks.filter(t=>t.dueDate===todayStr&&!t.done);
  const todayEvents=events.filter(e=>{const from=e.dateFrom||e.date||'';const to=e.dateTo||from;return todayStr>=from&&todayStr<=to;});
  if(todayTasks.length)new Notification('🏠 משימות להיום',{body:todayTasks.map(t=>'• '+t.title).join('\n'),icon:'icon-192.png'});
  if(todayEvents.length)new Notification('📅 אירועים היום',{body:todayEvents.map(e=>e.emoji+' '+e.title+(e.time?' בשעה '+e.time:'')).join('\n'),icon:'icon-192.png'});
}

// PWA
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;document.getElementById('installBanner').classList.add('show');});
window.installPWA=async()=>{
  if(!deferredInstallPrompt)return;
  deferredInstallPrompt.prompt();
  const{outcome}=await deferredInstallPrompt.userChoice;
  if(outcome==='accepted'){document.getElementById('installBanner').classList.remove('show');toast('🎉 האפליקציה הותקנה!');}
  deferredInstallPrompt=null;
};

// LISTENERS
function initListeners(){
  onSnapshot(collection(db,'tasks'),snap=>{tasks=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));renderTasks();setSyncStatus(true);},()=>setSyncStatus(false));
  onSnapshot(collection(db,'shopping'),snap=>{shopping=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));renderShopping();});
  onSnapshot(collection(db,'events'),snap=>{events=snap.docs.map(d=>({id:d.id,...d.data()}));renderCalendar();});
}

async function init(){
  await loadNames();updateNamesUI();initListeners();
  await requestNotifications();
  setTimeout(()=>{document.getElementById('loader').style.display='none';},1500);
  setTimeout(checkTodayNotifications,3000);
}
init();
</script>
</body>
</html>
